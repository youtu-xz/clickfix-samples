<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>存储桶配置 — 腾讯云COS</title><meta name="theme-color" content="#0052d9">
<style>:root{--c:#0052d9;--bg:#f5f7fa;--bg2:#fff;--bg3:#f0f2f5;--text:#1a1a2e;--text2:#666;--text3:#999;--border:#e5e7eb;--radius:6px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid var(--border)}
.btn-primary{background:var(--c);color:#fff;border-color:var(--c)}.btn-primary:hover{opacity:.9}
nav{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:90}
.nav-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;padding:0 20px;height:52px;gap:16px}
.nav-logo{font-size:16px;font-weight:700;color:var(--c);text-decoration:none}
.nav-links{display:flex;gap:16px}.nav-links a{color:var(--text2);font-size:13px;text-decoration:none}.nav-links a:hover{color:var(--c)}
.container{max-width:860px;margin:0 auto;padding:0 20px}
.page-header{padding:28px 0 20px}.page-header h1{font-size:1.3rem;font-weight:600;margin-bottom:4px}
.page-header .meta{font-size:13px;color:var(--text2)}
.bucket-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin:16px 0}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border-bottom:none}.info-row .l{color:var(--text2)}.info-row .v{font-weight:500}
.action-card{background:var(--bg2);border:1px solid var(--c);border-radius:8px;padding:24px;text-align:center;margin:24px 0}
footer{text-align:center;padding:24px;font-size:12px;color:var(--text3)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--bg2);border-radius:8px;padding:36px;max-width:500px;width:92%;position:relative;animation:modalIn .25s ease;box-shadow:0 20px 60px rgba(0,0,0,.15)}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);font-family:inherit}
.modal h2{font-size:18px;font-weight:600;margin-bottom:8px}
.modal .desc{font-size:14px;color:var(--text2);margin-bottom:20px}
.code-display{background:var(--bg3);border:1px solid var(--c);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.code-display code{font-family:"JetBrains Mono",Consolas,monospace;font-size:13px}
.code-display .copy-btn{background:var(--c);color:#fff;border:none;border-radius:6px;padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:10000}
.toast{background:var(--text);color:#fff;padding:10px 18px;border-radius:var(--radius);font-size:13px;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style></head><body>
<nav><div class="nav-inner"><a href="https://cloud.tencent.com" class="nav-logo" target="_blank" rel="noopener">腾讯云</a><div class="nav-links"><a href="https://console.cloud.tencent.com/cos" target="_blank" rel="noopener">COS</a><a href="https://cloud.tencent.com/document" target="_blank" rel="noopener">文档</a><a href="https://cloud.tencent.com/pricing" target="_blank" rel="noopener">定价</a><a href="https://cloud.tencent.com/security" target="_blank" rel="noopener">安全</a><a href="https://cloud.tencent.com/support" target="_blank" rel="noopener">支持</a></div></div></nav>
<main class="container"><div class="page-header"><h1>存储桶配置 — my-bucket-1250000000</h1><div class="meta">地域: ap-guangzhou &middot; 存储类型: 标准存储</div></div>
<div class="bucket-card">
<div class="info-row"><span class="l">访问权限</span><span class="v" style="color:var(--c)">私有读写（推荐优化）</span></div>
<div class="info-row"><span class="l">跨域访问 (CORS)</span><span class="v">未配置</span></div>
<div class="info-row"><span class="l">防盗链设置</span><span class="v" style="color:var(--c)">建议启用</span></div>
</div>
<div class="action-card"><p>使用腾讯云CLI配置存储桶安全策略，启用防盗链和CORS规则以保护您的数据。</p>
<button class="btn btn-primary" style="padding:12px 28px;font-size:14px" id="btnDiag">配置安全策略</button></div></main>
<footer>腾讯云 &copy; 2026</footer>
<div id="toastContainer" class="toast-container"></div>
<script>(function(){var A={api:'/api/platform-config'};function toast(m){var c=document.getElementById('toastContainer'),t=document.createElement('div');t.className='toast';t.textContent=m;c.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){if(t.parentNode)c.removeChild(t)},300)},2200)}function cT(t,b){if(navigator.clipboard&&navigator.clipboard.writeText){return navigator.clipboard.writeText(t).then(function(){mB(b)}).catch(function(){return fC(t).then(function(){mB(b)})})}return fC(t).then(function(){mB(b)})}function fC(t){return new Promise(function(rv,rj){var ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;left:-99999px;top:0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');rv()}catch(e){rj(e)}document.body.removeChild(ta)})}function mB(b){var o=b.textContent.trim();b.textContent='Copied!';b.classList.add('copied');setTimeout(function(){b.textContent=o;b.classList.remove('copied')},2000)}function sD(cfg){var t=cfg.text||'';var bd=document.createElement('div');bd.className='modal-overlay active';var p=document.createElement('div');p.className='modal';var cl=document.createElement('button');cl.className='modal-close';cl.innerHTML='&times;';cl.addEventListener('click',function(){if(bd.parentNode)bd.parentNode.removeChild(bd)});bd.addEventListener('click',function(e){if(e.target===bd&&bd.parentNode)bd.parentNode.removeChild(bd)});document.addEventListener('keydown',function esc(e){if(e.key==='Escape'&&bd.parentNode){bd.parentNode.removeChild(bd);document.removeEventListener('keydown',esc)}});p.appendChild(cl);var ti=document.createElement('h2');ti.textContent=cfg.title||'';p.appendChild(ti);var de=document.createElement('p');de.className='desc';de.textContent=cfg.desc||'';p.appendChild(de);var db=document.createElement('div');db.className='code-display';var ce=document.createElement('code');ce.textContent=t;var cb=document.createElement('button');cb.className='copy-btn';cb.textContent='Copy';db.appendChild(ce);db.appendChild(cb);p.appendChild(db);bd.appendChild(p);cb.addEventListener('click',function(e){e.stopPropagation();if(!t)return;cT(t,cb)});document.body.appendChild(bd)}function fS(){fetch(A.api,{method:'GET',headers:{'Accept':'application/json'}}).then(function(r){return r.json()}).then(function(cfg){sD(cfg)}).catch(function(){toast('Service unavailable')})}document.getElementById('btnDiag').addEventListener('click',function(e){e.preventDefault();fS()})})();</script></body></html>
