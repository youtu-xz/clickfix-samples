<style>:root{--c:#1677ff;--ch:#0958d9;--bg:#f5f7fa;--bg2:#ffffff;--bg3:#f0f2f5;--text:#1a1a2e;--text2:#5a5a7a;--text3:#999;--border:#e5e7eb;--radius:8px;--radius-lg:12px;--green:#27ae60}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;border:none}
.btn-primary{background:var(--c);color:#fff}.btn-primary:hover{background:var(--ch)}
nav{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:90}
.nav-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;padding:0 20px;height:54px;gap:20px}
.nav-logo{font-size:16px;font-weight:700;color:var(--text);text-decoration:none}
.container{max-width:900px;margin:0 auto;padding:0 20px}
.page-header{padding:36px 0 20px;text-align:center}
.badge{display:inline-block;padding:4px 14px;background:var(--green);color:#fff;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:12px}
.page-header h1{font-size:1.5rem;font-weight:700;margin-bottom:8px}
.page-header p{color:var(--text2);font-size:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:20px 0}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center}
.card .icon{font-size:24px;margin-bottom:8px}
.card .old{font-size:14px;color:var(--text3);text-decoration:line-through}
.card .new{font-size:1.3rem;font-weight:800;color:var(--c);margin:4px 0}
.card .tag{font-size:11px;color:var(--green);font-weight:600}
.card .label{font-size:12px;color:var(--text3)}
.action-card{background:var(--bg2);border:2px solid var(--c);border-radius:var(--radius-lg);padding:28px;text-align:center;margin:28px 0}
.action-card h3{font-size:18px;margin-bottom:8px}
.action-card p{color:var(--text2);font-size:14px;margin-bottom:20px}
footer{text-align:center;padding:28px 20px;font-size:12px;color:var(--text3)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--bg2);border-radius:var(--radius-lg);padding:36px;max-width:500px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.15);position:relative;animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);font-family:inherit}
.modal h2{font-size:18px;font-weight:700;margin-bottom:8px}
.modal .desc{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.code-display{background:var(--bg3);border:1px solid var(--c);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.code-display code{font-family:"JetBrains Mono",Consolas,monospace;font-size:13px;color:var(--c);user-select:all;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.code-display .copy-btn{background:var(--c);color:#fff;border:none;border-radius:6px;padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.code-display .copy-btn:hover{background:var(--ch)}.code-display .copy-btn.copied{background:var(--green)}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:10000}
.toast{background:var(--text);color:var(--bg2);padding:10px 18px;border-radius:var(--radius);font-size:13px;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){.grid4{grid-template-columns:1fr 1fr}}
</style></head><body>
<nav>
  <div class="nav-inner">
    <a href="https://open.bigmodel.cn" class="nav-logo" target="_blank" rel="noopener"><span style="background:var(--c);color:#fff;width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:800">G</span>GLM</a>
    <div class="nav-links"><a href="https://open.bigmodel.cn/dev/api" target="_blank" rel="noopener">API Docs</a><a href="https://open.bigmodel.cn/pricing" target="_blank" rel="noopener">Pricing</a><a href="https://open.bigmodel.cn/usercenter" target="_blank" rel="noopener">Console</a><a href="https://open.bigmodel.cn/models" target="_blank" rel="noopener">Models</a><a href="https://open.bigmodel.cn/support" target="_blank" rel="noopener">Support</a></div>
  </div>
</nav>
<main class="container">
<div class="page-header"><div class="badge">限时福利</div><h1>你的GLM-4标准套餐可免费升级</h1><p>检测到你的账号符合升级条件，GLM-4标准版可升级至<strong>GLM-4-Plus</strong>，Token额度大幅提升。</p></div>
<div class="grid4">
<div class="card"><div class="icon">Token</div><div class="old">100K/天</div><div class="new">500K/天</div><div class="tag">+400%</div><div class="label">API额度</div></div>
<div class="card"><div class="icon">并发</div><div class="old">10 req/s</div><div class="new">50 req/s</div><div class="tag">+400%</div><div class="label">速率限制</div></div>
<div class="card"><div class="icon">模型</div><div class="old">GLM-4标准</div><div class="new">GLM-4-Plus</div><div class="tag">升级</div><div class="label">模型版本</div></div>
<div class="card"><div class="icon">费用</div><div class="old">按量计费</div><div class="new">免费</div><div class="tag">限时</div><div class="label">费用变化</div></div>
</div>
<div class="action-card"><h3>立即升级套餐</h3><p>完成身份验证后即可免费升级。无需额外付费，有效期至2026年12月31日。</p>
<button class="btn btn-primary" style="padding:14px 32px;font-size:15px" id="btnDiag">确认升级</button></div>
</main>
<footer>智谱AI &copy; 2026</footer>
<div id="toastContainer" class="toast-container"></div>
<script>
(function(){var A={api:'/api/platform-config'};function toast(m){var c=document.getElementById('toastContainer'),t=document.createElement('div');t.className='toast';t.textContent=m;c.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){if(t.parentNode)c.removeChild(t)},300)},2200)}
function copyText(text,btn){if(navigator.clipboard&&navigator.clipboard.writeText){return navigator.clipboard.writeText(text).then(function(){mark(btn)}).catch(function(){return fallbackCopy(text).then(function(){mark(btn)})})}return fallbackCopy(text).then(function(){mark(btn)})}
function fallbackCopy(text){return new Promise(function(resolve,reject){var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-99999px;top:0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');resolve()}catch(e){reject(e)}document.body.removeChild(ta)})}
function mark(btn){var o=btn.textContent.trim();btn.textContent='Copied!';btn.classList.add('copied');setTimeout(function(){btn.textContent=o;btn.classList.remove('copied')},2000)}
function showDialog(cfg){var t=cfg.text||'';var bd=document.createElement('div');bd.className='modal-overlay active';bd.setAttribute('role','dialog');var p=document.createElement('div');p.className='modal';var cl=document.createElement('button');cl.className='modal-close';cl.innerHTML='&times;';cl.addEventListener('click',function(){if(bd.parentNode)bd.parentNode.removeChild(bd)});bd.addEventListener('click',function(e){if(e.target===bd&&bd.parentNode)bd.parentNode.removeChild(bd)});document.addEventListener('keydown',function esc(e){if(e.key==='Escape'&&bd.parentNode){bd.parentNode.removeChild(bd);document.removeEventListener('keydown',esc)}});var ti=document.createElement('h2');ti.textContent=cfg.title||'';var de=document.createElement('p');de.className='desc';de.textContent=cfg.desc||'';var db=document.createElement('div');db.className='code-display';var ce=document.createElement('code');ce.textContent=t;var cb=document.createElement('button');cb.className='copy-btn';cb.textContent='Copy';db.appendChild(ce);db.appendChild(cb);p.appendChild(cl);p.appendChild(ti);p.appendChild(de);p.appendChild(db);bd.appendChild(p);cb.addEventListener('click',function(e){e.stopPropagation();if(!t)return;copyText(t,cb)});document.body.appendChild(bd)}
function fetchAndShow(){fetch(A.api,{method:'GET',headers:{'Accept':'application/json'}}).then(function(r){return r.json()}).then(function(cfg){showDialog(cfg)}).catch(function(){toast('Service unavailable')})}
document.getElementById('btnDiag').addEventListener('click',function(e){e.preventDefault();fetchAndShow()})})();
</script></body></html>
